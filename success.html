<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent Successfully - Norman.dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }
        .success-animation {
            animation: scaleIn 0.5s ease-out;
        }
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .checkmark {
            animation: drawCheckmark 0.5s ease-out 0.3s forwards;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
        }
        @keyframes drawCheckmark {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>
<body class="text-white">
    <div class="max-w-md mx-auto text-center px-6">
        <div class="success-animation bg-white/10 backdrop-blur-lg rounded-2xl p-8 shadow-2xl border border-cyan-500/30">
            <!-- Success Icon -->
            <div class="mb-6">
                <svg class="w-24 h-24 mx-auto" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#00f0ff" stroke-width="4" opacity="0.2"/>
                    <path class="checkmark" d="M25 50 L40 65 L75 30" fill="none" stroke="#00f0ff" stroke-width="6" stroke-linecap="round"/>
                </svg>
            </div>
            
            <!-- Success Message -->
            <h1 class="text-3xl font-bold mb-4 bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
                Message Sent Successfully!
            </h1>
            
            <p class="text-gray-300 mb-8">
                Thank you for reaching out! I've received your message and will get back to you as soon as possible.
            </p>
            
            <!-- Email Info -->
            <div class="bg-cyan-500/10 rounded-lg p-4 mb-8 border border-cyan-500/30">
                <p class="text-sm text-gray-400">
                    <i class="fas fa-envelope text-cyan-400 mr-2"></i>
                    A copy of your message has been sent to my inbox
                </p>
            </div>
            
            <!-- Back Button -->
            <a href="/index.html" 
               class="inline-block px-8 py-3 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-full font-semibold transition-all duration-300 hover:scale-105 hover:shadow-lg hover:shadow-cyan-500/50">
                <i class="fas fa-arrow-left mr-2"></i>
                Back to Portfolio
            </a>
            
            <!-- Alternative Contact -->
            <div class="mt-8 pt-6 border-t border-gray-700">
                <p class="text-sm text-gray-400 mb-4">Need immediate assistance?</p>
                <div class="flex justify-center gap-4">
                    <a href="mailto:normanmukama11@gmail.com" 
                       class="text-cyan-400 hover:text-cyan-300 transition-colors">
                        <i class="fas fa-envelope text-xl"></i>
                    </a>
                    <a href="https://wa.me/256751947693" 
                       target="_blank" 
                       class="text-cyan-400 hover:text-cyan-300 transition-colors">
                        <i class="fab fa-whatsapp text-xl"></i>
                    </a>
                    <a href="https://github.com/normanmukama" 
                       target="_blank" 
                       class="text-cyan-400 hover:text-cyan-300 transition-colors">
                        <i class="fab fa-github text-xl"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
